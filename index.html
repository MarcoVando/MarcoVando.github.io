<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Academic Homepage</title>

<link rel="stylesheet" href="css/style.css">

<script defer src="js/data.js"></script>
<script defer src="js/main.js"></script>
</head>

<body>

<header class="topbar">
    <div class="logo" id="siteName"></div>

    <nav>
        <a href="#education">Education</a>
        <a href="#experience">Experience</a>
        <a href="#awards">Awards_Prizes</a>
        <a href="#projects">Projects</a>
        <a href="#news">News</a>
        <a href="#publications">Publications</a>

        <button id="themeToggle">🌙</button>
    </nav>
</header>

<aside class="sidebar hero">

        <div class = "image">
                <img src="images/fototessera.jpg" class="profile-image" alt="Profile Picture" id="profileImage">
        </div>

        <h1 id="name"></h1>

        <p id="title"></p>

        <div class="links">

            <a id="emailLink"><img src="images/mail.png" alt="Email"></a>
            <a id="githubLink"><img src="images/github.png" alt="GitHub"></a>
            <a id="linkedinLink"><img src="images/linkedin.png" alt="LinkedIn"></a>
            <a id="scholarLink"><img src="images/scholar.png" alt="Scholar"></a>

        </div>

        <a id="cvLink" class="cv-btn">
            Download CV
        </a>

    </aside>

<div class="layout">

    <main>

        <section id="small_descr">
            <!-- <h2>About & Contact</h2> -->
            <div id="small_description"></div>
        </section>

        <section id="about">
            <h2>About & Contact</h2>
            <div id="aboutContent"></div>
        </section>

        <section id="education">
            <h2>Education & Experience</h2>
            <div id="educationContent"></div>
        </section>

        <section id="experience">
            <h2>Experience</h2>
            <div id="experienceContent"></div>
        </section>

        <section id="awards">
            <h2>Awards</h2>
            <div id="awardsContent"></div>
        </section>

        <section id="projects">
            <h2>Projects</h2>
            <div class="project-grid" id="projectGrid"></div>
            <div class="project-grid" id="projectGridMarkdown"></div>
        </section>

        <section id="news">
            <h2>News</h2>
            <div class="news-grid" id="newsGrid"></div>
            <div class="timeline" id="newsTimeline"></div>
        </section>

        <section id="publications">
            <h2>Publications</h2>

            <div id="publicationFilters"></div>

            <div id="publicationList"></div>
        </section>

    </main>

</div>

</body>
</html>
